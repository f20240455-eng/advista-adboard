<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — BookMyBoard</title>
  <link rel="icon" href="/icons/icon-192.png" />
  <meta name="theme-color" content="#0b6e5c" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="BookMyBoard" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="panel" style="text-align:center;">
      <a href="/" class="brand" style="display:block; margin-bottom:16px;">Book<span class="accent-word">MyBoard</span></a>
      <h1 style="font-size:1.4rem; font-weight:600; margin-bottom:6px;">You're offline</h1>
      <p class="sub" style="margin-bottom:22px;">
        We can't reach BookMyBoard right now. Check your connection and try again.
      </p>
      <button class="btn btn-primary btn-block" onclick="location.reload()">Try again</button>
    </div>
  </div>
</body>
</html>
