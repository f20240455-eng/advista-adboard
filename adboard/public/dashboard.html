<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — BookMyBoard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230b6e5c'/><text x='50' y='70' font-size='58' text-anchor='middle' fill='white' font-family='Georgia,serif' font-weight='bold'>B</text></svg>" />
  <meta name="theme-color" content="#0b6e5c" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="BookMyBoard" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container" id="page" style="display:none; padding-bottom: 40px;">
    <div class="page-title">
      <h1 id="hello"></h1>
      <p id="role-line"></p>
    </div>

    <!-- advertiser -->
    <div id="client-view" style="display:none;">
      <div class="tabs"><button class="active">My booking requests</button></div>
      <div id="client-bookings"></div>
    </div>

    <!-- owner -->
    <div id="owner-view" style="display:none;">
      <div class="tabs">
        <button class="active" data-tab="requests">Booking requests</button>
        <button data-tab="listings">My listings</button>
        <button data-tab="add">+ Add a space</button>
      </div>

      <div id="tab-requests"></div>

      <div id="tab-listings" style="display:none;">
        <div class="card-grid" id="owner-listings"></div>
      </div>

      <div id="tab-add" style="display:none;">
        <div class="panel" style="max-width: 640px;">
          <h3>List a new ad space</h3>
          <div class="form-error" id="add-err"></div>
          <div class="form-success" id="add-ok"></div>
          <div class="form-group"><label>Title</label>
            <input id="a-title" placeholder="e.g. NH-8 Fuel Station Hoarding" /></div>
          <div class="form-row">
            <div class="form-group"><label>City</label><input id="a-city" placeholder="Balangir" /></div>
            <div class="form-group"><label>Format</label>
              <select id="a-type">
                <option>Billboard</option><option>Unipole</option><option>Digital LED</option>
                <option>Gantry</option><option>Metro Pillar</option><option>Wall Wrap</option>
              </select></div>
          </div>
          <div class="form-group"><label>Location / landmark</label>
            <input id="a-location" placeholder="NH-26, near the auto showroom cluster" /></div>
          <div class="form-row">
            <div class="form-group"><label>Size</label><input id="a-size" placeholder="30 x 12 ft" /></div>
            <div class="form-group"><label>Facing</label><input id="a-facing" placeholder="Sambalpur-bound traffic" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Daily traffic (vehicles)</label>
              <input id="a-traffic" type="number" placeholder="48000" /></div>
            <div class="form-group"><label>Price per month (₹)</label>
              <input id="a-price" type="number" placeholder="55000" /></div>
          </div>
          <div class="form-group">
            <label><input type="checkbox" id="a-lit" style="width:auto; margin-right: 8px;" />Backlit / illuminated</label>
          </div>
          <div class="form-group"><label>Description</label>
            <textarea id="a-desc" rows="3" placeholder="What makes this space work?"></textarea></div>
          <button class="btn btn-primary" id="a-submit">Publish listing</button>
        </div>
      </div>
    </div>

    <!-- supplier -->
    <div id="vendor-view" style="display:none;">
      <div class="tabs">
        <button class="active" data-vtab="requests">Quote requests</button>
        <button data-vtab="profile">My listing</button>
      </div>

      <div id="vtab-requests"></div>

      <div id="vtab-profile" style="display:none;">
        <div class="panel" style="max-width: 640px;">
          <h3 id="v-heading">List your service</h3>
          <div class="form-error" id="v-err"></div>
          <div class="form-success" id="v-ok"></div>
          <div class="form-group"><label>Business name</label>
            <input id="v-name" placeholder="e.g. Sharma Flex & Printing" /></div>
          <div class="form-row">
            <div class="form-group"><label>Service</label><select id="v-cat"></select></div>
            <div class="form-group"><label>City</label><input id="v-city" placeholder="Balangir" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Phone (shown to buyers)</label>
              <input id="v-phone" placeholder="+91…" /></div>
            <div class="form-group"><label>Starting price (₹, optional)</label>
              <input id="v-min" type="number" placeholder="5000" /></div>
          </div>
          <div class="form-group"><label>What do you offer?</label>
            <textarea id="v-desc" rows="3" placeholder="Flex printing up to 60ft, same-day turnaround, installation team available."></textarea></div>
          <button class="btn btn-primary" id="v-submit">Publish</button>
        </div>
      </div>
    </div>
  </div>

  <footer></footer>

  <script src="/shared.js"></script>
  <script>
    const el = (id) => document.getElementById(id);
    let cfg = null;

    // ---------- bookings ----------
    function bookingRowHTML(b, isOwner) {
      // The heading already names the listing, so only the owner view needs a "who".
      const who = isOwner ? `Requested by <strong>${esc(b.clientName)}</strong> · ` : "";

      let actions = "";
      if (isOwner && b.status === "pending") {
        actions = `<div class="row-actions">
             <button class="btn btn-small btn-approve" data-id="${esc(b.id)}" data-status="approved">Approve</button>
             <button class="btn btn-small btn-reject" data-id="${esc(b.id)}" data-status="rejected">Reject</button>
           </div>`;
      } else if (!isOwner && b.status === "approved" && b.paymentStatus !== "paid") {
        actions = cfg.razorpayEnabled
          ? `<button class="btn btn-small btn-primary" data-pay="${esc(b.id)}">Pay ${formatINR(b.amountTotal)}</button>`
          : `<span class="muted-note">Payment coming soon</span>`;
      }

      // Owners see their net payout; advertisers see what they pay.
      const money = isOwner
        ? `You receive ${formatINR(b.ownerPayout)} <span class="fee-note">(after ${cfg.commissionPct}% fee)</span>`
        : `${formatINR(b.amountTotal)} total`;

      const paidTag =
        b.paymentStatus === "paid" ? `<span class="badge badge-paid">Paid</span>` : "";

      // Proof-of-play: once a booking is approved, the owner can attach a
      // mounting photo so the advertiser can see the creative actually went up.
      let proofHTML = "";
      if (b.status === "approved") {
        const thumbs = b.photos
          .map(
            (p) => `
          <a class="photo-thumb" href="${p.imageDataUrl}" target="_blank" rel="noopener" title="${esc(p.caption) || (p.kind === "monitoring" ? "Monitoring photo" : "Mounting photo")}">
            <img src="${p.imageDataUrl}" alt="" />
            <span class="kind-tag">${p.kind === "monitoring" ? "Live" : "Mount"}</span>
          </a>`
          )
          .join("");
        const addBtn = isOwner
          ? `<label class="photo-add-btn" title="Add proof photo">+
               <input type="file" accept="image/*" capture="environment" class="photo-input" data-booking="${esc(b.id)}" hidden />
             </label>`
          : "";
        const statusLine = b.photos.length
          ? `<p class="proof-status live">${b.photos.length} proof photo${b.photos.length > 1 ? "s" : ""} uploaded</p>`
          : isOwner
          ? `<p class="proof-status pending">Add a photo once the creative is up</p>`
          : `<p class="proof-status pending">Waiting on a proof photo from the owner</p>`;
        proofHTML = `<div class="photo-row">${thumbs}${addBtn}</div>${statusLine}`;
      }

      return `
        <div class="booking-row">
          <div class="info">
            <h3>${esc(b.listingTitle)} <span style="color:var(--muted); font-weight:400;">· ${esc(b.listingCity)}</span></h3>
            <p>${who}${esc(b.startDate)} → ${esc(b.endDate)}${b.message ? " · “" + esc(b.message) + "”" : ""}</p>
            <p class="money-line">${money}</p>
            ${proofHTML}
          </div>
          <div class="side">
            <span class="badge badge-${esc(b.status)}">${esc(b.status)}</span>
            ${paidTag}
            ${actions}
          </div>
        </div>`;
    }

    async function payBooking(bookingId, user) {
      try {
        const order = await api(`/api/bookings/${bookingId}/pay`, { method: "POST" });
        const rz = new Razorpay({
          key: cfg.razorpayKeyId,
          order_id: order.orderId,
          amount: order.amount,
          currency: order.currency,
          name: "BookMyBoard",
          description: "Billboard booking",
          prefill: { name: user.name, email: user.email },
          theme: { color: "#0b6e5c" },
          handler: async (resp) => {
            try {
              await api(`/api/bookings/${bookingId}/pay/verify`, {
                method: "POST",
                body: JSON.stringify({
                  paymentId: resp.razorpay_payment_id,
                  signature: resp.razorpay_signature,
                }),
              });
              showToast("Payment received. Your booking is confirmed.");
              loadBookings(user);
            } catch (e) {
              showToast(e.message, "error");
            }
          },
        });
        rz.open();
      } catch (e) {
        showToast(e.message, "error");
      }
    }

    async function loadBookings(user) {
      const { bookings } = await api("/api/bookings");
      const isOwner = user.role === "owner";
      const target = isOwner ? el("tab-requests") : el("client-bookings");
      target.innerHTML = bookings.length
        ? bookings.map((b) => bookingRowHTML(b, isOwner)).join("")
        : `<div class="empty">${
            isOwner
              ? "No booking requests yet. They'll appear here when advertisers pick your spaces."
              : 'No bookings yet. <a href="/listings.html">Browse spaces</a> and request your first campaign slot.'
          }</div>`;

      target.querySelectorAll("button[data-id]").forEach((btn) =>
        btn.addEventListener("click", async () => {
          try {
            await api(`/api/bookings/${btn.dataset.id}/decision`, {
              method: "POST",
              body: JSON.stringify({ status: btn.dataset.status }),
            });
            showToast(
              btn.dataset.status === "approved"
                ? "Booking approved."
                : "Booking rejected."
            );
            loadBookings(user);
          } catch (e) {
            showToast(e.message, "error");
          }
        })
      );
      target.querySelectorAll("button[data-pay]").forEach((btn) =>
        btn.addEventListener("click", () => payBooking(btn.dataset.pay, user))
      );
      target.querySelectorAll("input.photo-input").forEach((input) =>
        input.addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const label = input.closest("label");
          label.style.opacity = "0.5";
          try {
            const dataUrl = await fileToCompressedDataUrl(file);
            await api(`/api/bookings/${input.dataset.booking}/photos`, {
              method: "POST",
              body: JSON.stringify({ kind: "mount", imageDataUrl: dataUrl }),
            });
            showToast("Proof photo added.");
            loadBookings(user);
          } catch (err) {
            showToast(err.message, "error");
            label.style.opacity = "1";
          }
        })
      );
    }

    // ---------- availability calendar (owner) ----------
    function ownerListingRowHTML(l) {
      return `
        <div class="panel" style="padding:0; overflow:hidden;">
          <div class="card-banner" style="aspect-ratio:16/7;">
            <img src="${themePhoto(l.theme, 500)}" alt="" loading="lazy" />
            <span class="type-tag">${esc(l.type)}</span>
          </div>
          <div class="card-body">
            <h3>${esc(l.title)}</h3>
            <p class="loc">${esc(l.location)}, ${esc(l.city)}</p>
            <div class="card-meta">
              <div class="price">${formatINR(l.pricePerMonth)}<span>/month</span></div>
              <button type="button" class="btn btn-outline btn-small" data-cal-toggle="${esc(l.id)}">Manage calendar</button>
            </div>
            <div class="cal-wrap" id="cal-${esc(l.id)}" style="display:none; margin-top:14px;"></div>
          </div>
        </div>`;
    }

    async function toggleCalendar(listingId) {
      const wrap = el("cal-" + listingId);
      const hidden = wrap.style.display === "none";
      if (!hidden) { wrap.style.display = "none"; return; }
      wrap.style.display = "block";
      if (wrap.dataset.loaded === "1") return;
      wrap.dataset.loaded = "1";
      wrap.innerHTML = '<p style="color:var(--muted); font-size:0.85rem;">Loading…</p>';

      let data;
      try {
        data = await api(`/api/listings/${listingId}`);
      } catch (e) {
        wrap.innerHTML = `<p style="color:var(--danger); font-size:0.85rem;">${esc(e.message)}</p>`;
        return;
      }
      const bookedSet = new Set(data.bookedRanges.flatMap((r) => expandDateRange(r.startDate, r.endDate)));
      const blockedSet = new Set(data.blockedDates);

      wrap.innerHTML = `<div id="calbox-${listingId}"></div>
        <div class="cal-legend">
          <span><i class="i-booked"></i>Booked</span>
          <span><i class="i-blocked"></i>Blocked — tap an open day to block it, tap again to reopen</span>
        </div>`;

      const handle = mountCalendar(el("calbox-" + listingId), {
        booked: bookedSet,
        blocked: blockedSet,
        mode: "manage",
        onChange: async ({ date, wasBlocked }) => {
          try {
            if (wasBlocked) {
              await api(`/api/listings/${listingId}/blocks/${date}`, { method: "DELETE" });
              blockedSet.delete(date);
            } else {
              await api(`/api/listings/${listingId}/blocks`, {
                method: "POST",
                body: JSON.stringify({ date }),
              });
              blockedSet.add(date);
            }
            handle.setUnavailable(bookedSet, blockedSet);
          } catch (e) {
            showToast(e.message, "error");
          }
        },
      });
    }

    async function loadOwnerListings() {
      const { listings } = await api("/api/my-listings");
      el("owner-listings").innerHTML = listings.length
        ? listings.map(ownerListingRowHTML).join("")
        : '<div class="empty">No listings yet — add your first space.</div>';
      el("owner-listings").querySelectorAll("[data-cal-toggle]").forEach((btn) =>
        btn.addEventListener("click", () => toggleCalendar(btn.dataset.calToggle))
      );
    }

    // ---------- vendor ----------
    async function loadVendorProfile() {
      const { categories } = await api("/api/vendor-categories");
      el("v-cat").innerHTML = categories.map((c) => `<option>${esc(c)}</option>`).join("");
      const { vendor } = await api("/api/my-vendor");
      if (vendor) {
        el("v-heading").textContent = "My listing";
        el("v-name").value = vendor.name;
        el("v-cat").value = vendor.category;
        el("v-city").value = vendor.city;
        el("v-phone").value = vendor.phone;
        el("v-min").value = vendor.minPrice || "";
        el("v-desc").value = vendor.description;
        el("v-submit").textContent = "Save changes";
      }
      return vendor;
    }

    async function loadServiceRequests() {
      const { requests } = await api("/api/service-requests");
      el("vtab-requests").innerHTML = requests.length
        ? requests
            .map(
              (r) => `
          <div class="booking-row">
            <div class="info">
              <h3>${esc(r.requesterName)}</h3>
              <p>${r.message ? "“" + esc(r.message) + "”" : "No details given."}</p>
              ${r.requesterEmail ? `<p class="money-line">Reply to: <a href="mailto:${esc(r.requesterEmail)}">${esc(r.requesterEmail)}</a></p>` : ""}
            </div>
            <div class="side"><span class="badge badge-pending">${esc(r.status)}</span></div>
          </div>`
            )
            .join("")
        : '<div class="empty">No quote requests yet. Make sure your listing is published.</div>';
    }

    // ---------- boot ----------
    (async () => {
      const user = await getMe();
      renderNav(user, "dashboard");
      renderFooter();
      if (!user) {
        window.location.href = "/login.html?next=%2Fdashboard.html";
        return;
      }
      cfg = await getConfig();
      if (cfg.razorpayEnabled) {
        await new Promise((resolve) => {
          const s = document.createElement("script");
          s.src = "https://checkout.razorpay.com/v1/checkout.js";
          s.onload = resolve;
          s.onerror = resolve;
          document.head.appendChild(s);
        });
      }

      el("hello").textContent = "Hello, " + user.name;
      el("role-line").textContent =
        user.role === "owner"
          ? "Space owner dashboard — manage your listings and booking requests."
          : user.role === "vendor"
          ? "Supplier dashboard — manage your service listing and quote requests."
          : "Track your campaign booking requests.";
      el("page").style.display = "block";

      if (user.role === "client") {
        el("client-view").style.display = "block";
        loadBookings(user);
        return;
      }

      if (user.role === "vendor") {
        el("vendor-view").style.display = "block";
        const vendor = await loadVendorProfile();
        loadServiceRequests();
        if (!vendor) {
          // Nudge new suppliers straight to the profile form.
          document.querySelector('[data-vtab="profile"]').click();
        }
        document.querySelectorAll(".tabs button[data-vtab]").forEach((btn) =>
          btn.addEventListener("click", () => {
            document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            ["requests", "profile"].forEach((t) => {
              el("vtab-" + t).style.display = t === btn.dataset.vtab ? "block" : "none";
            });
          })
        );
        el("v-submit").addEventListener("click", async () => {
          el("v-err").style.display = el("v-ok").style.display = "none";
          try {
            await api("/api/vendors", {
              method: "POST",
              body: JSON.stringify({
                name: el("v-name").value,
                category: el("v-cat").value,
                city: el("v-city").value,
                phone: el("v-phone").value,
                minPrice: el("v-min").value,
                description: el("v-desc").value,
              }),
            });
            el("v-ok").textContent = "Published. Buyers can now find you under Suppliers.";
            el("v-ok").style.display = "block";
            el("v-submit").textContent = "Save changes";
            showToast("Supplier listing saved.");
          } catch (e) {
            el("v-err").textContent = e.message;
            el("v-err").style.display = "block";
          }
        });
        return;
      }

      // owner
      el("owner-view").style.display = "block";
      loadBookings(user);
      loadOwnerListings();

      document.querySelectorAll(".tabs button[data-tab]").forEach((btn) =>
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          ["requests", "listings", "add"].forEach((t) => {
            el("tab-" + t).style.display = t === btn.dataset.tab ? "block" : "none";
          });
        })
      );

      el("a-submit").addEventListener("click", async () => {
        const err = el("add-err"), ok = el("add-ok");
        err.style.display = ok.style.display = "none";
        try {
          await api("/api/listings", {
            method: "POST",
            body: JSON.stringify({
              title: el("a-title").value,
              city: el("a-city").value,
              type: el("a-type").value,
              location: el("a-location").value,
              size: el("a-size").value,
              facing: el("a-facing").value,
              trafficPerDay: el("a-traffic").value,
              pricePerMonth: el("a-price").value,
              lit: el("a-lit").checked,
              description: el("a-desc").value,
            }),
          });
          ok.textContent = "Listing published! It's now visible to all advertisers.";
          ok.style.display = "block";
          showToast("Listing published.");
          loadOwnerListings();
        } catch (e) {
          err.textContent = e.message;
          err.style.display = "block";
        }
      });
    })();
  </script>
</body>
</html>
