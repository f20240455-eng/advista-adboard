<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — BookMyBoard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230b6e5c'/><text x='50' y='70' font-size='58' text-anchor='middle' fill='white' font-family='Georgia,serif' font-weight='bold'>B</text></svg>" />
  <meta name="theme-color" content="#0b6e5c" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="BookMyBoard" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="panel">
      <a href="/" class="brand">Book<span class="accent-word">MyBoard</span></a>
      <h1 id="heading">Welcome back</h1>
      <p class="sub" id="subheading">Log in to your account</p>
      <div class="form-error" id="err"></div>

      <a class="google-btn" id="google-btn" style="display:none;">
        <svg viewBox="0 0 48 48" width="18" height="18" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.6 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.8 6.1C12.3 13.2 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-3.1-.4-4.6H24v9h12.4c-.5 2.9-2.2 5.3-4.7 6.9l7.3 5.7c4.3-3.9 6.8-9.7 6.8-17z"/>
          <path fill="#FBBC05" d="M10.4 28.7c-.5-1.4-.8-2.9-.8-4.7s.3-3.3.8-4.7l-7.8-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.6 10.8l7.8-6.1z"/>
          <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.3-5.7c-2 1.4-4.7 2.3-8.6 2.3-6.3 0-11.7-3.7-13.6-9.1l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/>
        </svg>
        <span id="google-label">Continue with Google</span>
      </a>
      <div class="divider" id="divider" style="display:none;"><span>or</span></div>

      <div id="register-extra" style="display:none;">
        <div class="role-toggle three">
          <button type="button" id="role-client" class="selected">Advertising<small>Book space</small></button>
          <button type="button" id="role-owner">I own space<small>List &amp; earn</small></button>
          <button type="button" id="role-vendor">Supplier<small>Print &amp; build</small></button>
        </div>
        <div class="form-group">
          <label>Business or brand name</label>
          <input type="text" id="name" autocomplete="organization" placeholder="Your company name" />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@company.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-block" id="submit">Log in</button>

      <p class="auth-alt" id="forgot-row">
        <a href="/forgot.html">Forgot your password?</a>
      </p>
      <p class="auth-alt">
        <span id="switch-text">New here?</span>
        <a href="#" id="switch-link">Create an account</a>
      </p>
    </div>
  </div>

  <script src="/shared.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    let mode = params.get("mode") === "register" ? "register" : "login";
    let role = ["owner", "vendor"].includes(params.get("role")) ? params.get("role") : "client";
    const next = params.get("next") || "/dashboard.html";

    const el = (id) => document.getElementById(id);

    function showError(msg) {
      el("err").textContent = msg;
      el("err").style.display = "block";
    }

    function renderMode() {
      const reg = mode === "register";
      el("heading").textContent = reg ? "Create your account" : "Welcome back";
      el("subheading").textContent = reg
        ? "It takes less than a minute."
        : "Log in to your account";
      el("register-extra").style.display = reg ? "block" : "none";
      el("submit").textContent = reg ? "Create account" : "Log in";
      el("password").autocomplete = reg ? "new-password" : "current-password";
      el("forgot-row").style.display = reg ? "none" : "block";
      el("switch-text").textContent = reg ? "Already have an account?" : "New here?";
      el("switch-link").textContent = reg ? "Log in instead" : "Create an account";
      el("google-label").textContent = reg ? "Sign up with Google" : "Continue with Google";
      updateGoogleHref();
    }

    function renderRole() {
      el("role-client").classList.toggle("selected", role === "client");
      el("role-owner").classList.toggle("selected", role === "owner");
      el("role-vendor").classList.toggle("selected", role === "vendor");
      updateGoogleHref();
    }

    function updateGoogleHref() {
      el("google-btn").href =
        `/auth/google?role=${encodeURIComponent(role)}&next=${encodeURIComponent(next)}`;
    }

    el("switch-link").addEventListener("click", (e) => {
      e.preventDefault();
      mode = mode === "register" ? "login" : "register";
      el("err").style.display = "none";
      renderMode();
    });
    ["client", "owner", "vendor"].forEach((r) =>
      el("role-" + r).addEventListener("click", () => { role = r; renderRole(); })
    );

    async function submit() {
      const btn = el("submit");
      el("err").style.display = "none";
      btn.disabled = true;
      btn.textContent = mode === "register" ? "Creating…" : "Logging in…";
      try {
        if (mode === "register") {
          await api("/api/register", {
            method: "POST",
            body: JSON.stringify({
              name: el("name").value,
              email: el("email").value,
              password: el("password").value,
              role,
            }),
          });
        } else {
          await api("/api/login", {
            method: "POST",
            body: JSON.stringify({
              email: el("email").value,
              password: el("password").value,
            }),
          });
        }
        window.location.href = next;
      } catch (e) {
        showError(e.message);
        btn.disabled = false;
        renderMode();
      }
    }

    el("submit").addEventListener("click", submit);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !el("submit").disabled) submit();
    });

    (async () => {
      const user = await getMe();
      if (user) { window.location.href = next; return; }
      renderMode();
      renderRole();
      if (params.get("error")) showError(params.get("error"));

      const cfg = await getConfig();
      if (cfg.googleEnabled) {
        el("google-btn").style.display = "flex";
        el("divider").style.display = "flex";
      }
    })();
  </script>
</body>
</html>
