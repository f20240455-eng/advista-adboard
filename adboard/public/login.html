<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — AdVista</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="panel">
      <h1 id="heading">Welcome back</h1>
      <p class="sub" id="subheading">Log in to your AdVista account</p>
      <div class="form-error" id="err"></div>

      <div id="register-extra" style="display:none;">
        <div class="role-toggle">
          <button type="button" id="role-client" class="selected">📣 I'm an Advertiser</button>
          <button type="button" id="role-owner">🏪 I own a Space</button>
        </div>
        <div class="form-group">
          <label>Business / brand name</label>
          <input type="text" id="name" placeholder="e.g. Brightwave Beverages" />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@company.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" id="submit" style="width:100%;">Log in</button>

      <p style="text-align:center; margin-top: 16px; font-size: 0.9rem; color: var(--muted);">
        <span id="switch-text">New to AdVista?</span>
        <a href="#" id="switch-link">Create an account</a>
      </p>

      <div class="demo-note">
        <strong>Demo accounts</strong> — client: <code>client@demo.com</code> ·
        owner: <code>owner@demo.com</code> · password: <code>demo123</code>
      </div>
    </div>
  </div>

  <script src="/shared.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    let mode = params.get("mode") === "register" ? "register" : "login";
    let role = params.get("role") === "owner" ? "owner" : "client";
    const next = params.get("next") || "/dashboard.html";

    const el = (id) => document.getElementById(id);

    function renderMode() {
      const reg = mode === "register";
      el("heading").textContent = reg ? "Create your account" : "Welcome back";
      el("subheading").textContent = reg
        ? "Join AdVista as an advertiser or space owner"
        : "Log in to your AdVista account";
      el("register-extra").style.display = reg ? "block" : "none";
      el("submit").textContent = reg ? "Create account" : "Log in";
      el("switch-text").textContent = reg ? "Already have an account?" : "New to AdVista?";
      el("switch-link").textContent = reg ? "Log in instead" : "Create an account";
      el("err").style.display = "none";
    }

    function renderRole() {
      el("role-client").classList.toggle("selected", role === "client");
      el("role-owner").classList.toggle("selected", role === "owner");
    }

    el("switch-link").addEventListener("click", (e) => {
      e.preventDefault();
      mode = mode === "register" ? "login" : "register";
      renderMode();
    });
    el("role-client").addEventListener("click", () => { role = "client"; renderRole(); });
    el("role-owner").addEventListener("click", () => { role = "owner"; renderRole(); });

    el("submit").addEventListener("click", async () => {
      const err = el("err");
      err.style.display = "none";
      try {
        if (mode === "register") {
          await api("/api/register", {
            method: "POST",
            body: JSON.stringify({
              name: el("name").value,
              email: el("email").value,
              password: el("password").value,
              role,
            }),
          });
        } else {
          await api("/api/login", {
            method: "POST",
            body: JSON.stringify({
              email: el("email").value,
              password: el("password").value,
            }),
          });
        }
        window.location.href = next;
      } catch (e) {
        err.textContent = e.message;
        err.style.display = "block";
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") el("submit").click();
    });

    (async () => {
      renderNav(await getMe(), "login");
      renderMode();
      renderRole();
    })();
  </script>
</body>
</html>
