<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Space Details — BookMyBoard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230b6e5c'/><text x='50' y='70' font-size='58' text-anchor='middle' fill='white' font-family='Georgia,serif' font-weight='bold'>B</text></svg>" />
  <meta name="theme-color" content="#0b6e5c" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="BookMyBoard" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container" id="page" style="padding-top: 32px; display: none;">
    <a href="/listings.html" class="back-link">← All spaces</a>
    <div class="detail-banner" id="banner"></div>
    <div class="detail-grid">
      <div>
        <h1 id="title" style="font-size: 1.8rem;"></h1>
        <p id="loc" style="color: var(--muted); margin-bottom: 4px;"></p>
        <p id="owner" style="color: var(--muted); font-size: 0.88rem;"></p>
        <div class="spec-grid" id="specs"></div>
        <h3 style="margin-bottom: 8px;">About this space</h3>
        <p id="desc" style="color: var(--muted);"></p>
      </div>

      <div>
        <div class="panel sticky">
          <div class="big-price" id="price"></div>
          <div id="booking-area" style="margin-top: 18px;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="container" id="notfound" style="display:none; padding: 80px 24px;">
    <div class="empty">Listing not found. <a href="/listings.html">Back to browse</a></div>
  </div>

  <footer></footer>

  <script src="/shared.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get("id");

    function spec(k, v) {
      return `<div class="spec"><div class="k">${k}</div><div class="v">${v}</div></div>`;
    }

    (async () => {
      const user = await getMe();
      renderNav(user, "listings");
      renderFooter();

      let data;
      try {
        data = await api("/api/listings/" + encodeURIComponent(id));
      } catch {
        document.getElementById("notfound").style.display = "block";
        return;
      }
      const { listing: l, ownerName, bookedRanges, blockedDates } = data;
      const bookedSet = new Set(bookedRanges.flatMap((r) => expandDateRange(r.startDate, r.endDate)));
      const blockedSet = new Set(blockedDates);

      document.title = l.title + " — BookMyBoard";
      const banner = document.getElementById("banner");
      banner.innerHTML = `<img src="${themePhoto(l.theme, 1000)}" alt="${esc(l.type)} at ${esc(l.location)}" />`;
      const titleEl = document.getElementById("title");
      titleEl.textContent = l.title;
      document.getElementById("loc").textContent = l.location + ", " + l.city;
      document.getElementById("owner").textContent = "Listed by " + ownerName;
      document.getElementById("desc").textContent = l.description;
      document.getElementById("price").innerHTML =
        formatINR(l.pricePerMonth) + " <span>/ month</span>";
      document.getElementById("specs").innerHTML = [
        spec("Format", esc(l.type)),
        spec("Size", esc(l.size)),
        spec("Daily traffic", formatTraffic(l.trafficPerDay) + " vehicles"),
        spec("Facing", esc(l.facing) || "—"),
        spec("Lighting", l.lit ? "Backlit" : "Non-lit"),
        spec("City", esc(l.city)),
      ].join("");

      const area = document.getElementById("booking-area");
      if (!user) {
        area.innerHTML = `
          <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 14px;">
            Log in as an advertiser to request this space for your campaign.
          </p>
          <a class="btn btn-primary" style="width:100%; text-align:center;"
             href="/login.html?next=${encodeURIComponent(location.pathname + location.search)}">
             Log in to book
          </a>`;
      } else if (user.role === "owner") {
        area.innerHTML = `<p style="color: var(--muted); font-size: 0.9rem;">
          You're logged in as a space owner. Only advertiser accounts can book spaces.</p>`;
      } else {
        area.innerHTML = `
          <div class="form-error" id="err"></div>
          <div class="form-success" id="ok"></div>
          <div class="cal-wrap"><div id="cal"></div></div>
          <div class="cal-legend">
            <span><i class="i-open"></i>Open</span>
            <span><i class="i-sel"></i>Selected</span>
            <span><i class="i-booked"></i>Booked</span>
            <span><i class="i-blocked"></i>Unavailable</span>
          </div>
          <p class="cal-selection-line" id="sel-line">Tap a start date, then an end date.</p>
          <div class="estimate" id="estimate">
            <div class="row"><span>Campaign length</span><strong id="est-days"></strong></div>
            <div class="row"><span>Est. total impressions</span><strong id="est-imp"></strong></div>
            <div class="row total"><span>Estimated cost</span><strong id="est-cost"></strong></div>
          </div>
          <div class="form-group" style="margin-top:14px;">
            <label>Message to owner (optional)</label>
            <textarea id="b-msg" rows="3" placeholder="Tell them about your campaign…"></textarea>
          </div>
          <button class="btn btn-primary" id="b-submit" style="width:100%;" disabled>Pick your dates</button>
          <p style="color: var(--muted); font-size: 0.78rem; text-align: center; margin-top: 12px;">
            No payment now — the owner confirms your dates first.
          </p>`;

        let picked = { selStart: null, selEnd: null };
        const submitBtn = document.getElementById("b-submit");

        function updateEstimate() {
          const box = document.getElementById("estimate");
          const line = document.getElementById("sel-line");
          const { selStart, selEnd } = picked;
          if (!selStart) {
            line.textContent = "Tap a start date, then an end date.";
            box.style.display = "none";
            submitBtn.disabled = true;
            submitBtn.textContent = "Pick your dates";
            return;
          }
          if (!selEnd) {
            line.innerHTML = `Start: <strong>${esc(selStart)}</strong> — now tap an end date.`;
            box.style.display = "none";
            submitBtn.disabled = true;
            submitBtn.textContent = "Pick your dates";
            return;
          }
          const days = Math.round((new Date(selEnd) - new Date(selStart)) / 86400000) + 1;
          line.innerHTML = `<strong>${esc(selStart)}</strong> → <strong>${esc(selEnd)}</strong> · tap again to restart`;
          document.getElementById("est-days").textContent = days + (days === 1 ? " day" : " days");
          document.getElementById("est-imp").textContent = "~" + formatTraffic(l.trafficPerDay * days);
          document.getElementById("est-cost").textContent = formatINR(Math.round((l.pricePerMonth * days) / 30));
          box.style.display = "block";
          submitBtn.disabled = false;
          submitBtn.textContent = "Request booking";
        }

        mountCalendar(document.getElementById("cal"), {
          booked: bookedSet,
          blocked: blockedSet,
          mode: "pick",
          onChange: (sel) => { picked = sel; updateEstimate(); },
        });

        submitBtn.addEventListener("click", async () => {
          const err = document.getElementById("err");
          const ok = document.getElementById("ok");
          err.style.display = ok.style.display = "none";
          try {
            await api("/api/bookings", {
              method: "POST",
              body: JSON.stringify({
                listingId: l.id,
                startDate: picked.selStart,
                endDate: picked.selEnd,
                message: document.getElementById("b-msg").value,
              }),
            });
            ok.textContent = "Request sent! Track it in your dashboard.";
            ok.style.display = "block";
            submitBtn.disabled = true;
          } catch (e) {
            err.textContent = e.message;
            err.style.display = "block";
          }
        });
      }

      document.getElementById("page").style.display = "block";
    })();
  </script>
</body>
</html>
