<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — BookMyBoard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230b6e5c'/><text x='50' y='70' font-size='58' text-anchor='middle' fill='white' font-family='Georgia,serif' font-weight='bold'>B</text></svg>" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="panel">
      <a href="/" class="brand">Book<span class="accent-word">MyBoard</span></a>
      <h1>Forgot your password?</h1>
      <p class="sub">Enter your email and we'll send you a reset link.</p>

      <div class="form-error" id="err"></div>
      <div class="form-success" id="ok"></div>

      <div id="form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" autocomplete="email" placeholder="you@company.com" />
        </div>
        <button class="btn btn-primary btn-block" id="submit">Send reset link</button>
      </div>

      <p class="auth-alt"><a href="/login.html">Back to log in</a></p>
    </div>
  </div>

  <script src="/shared.js"></script>
  <script>
    const el = (id) => document.getElementById(id);

    async function submit() {
      const btn = el("submit");
      el("err").style.display = "none";
      btn.disabled = true;
      btn.textContent = "Sending…";
      try {
        const r = await api("/api/forgot-password", {
          method: "POST",
          body: JSON.stringify({ email: el("email").value }),
        });
        el("form").style.display = "none";
        el("ok").textContent = r.message;
        el("ok").style.display = "block";
      } catch (e) {
        el("err").textContent = e.message;
        el("err").style.display = "block";
        btn.disabled = false;
        btn.textContent = "Send reset link";
      }
    }

    el("submit").addEventListener("click", submit);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !el("submit").disabled) submit();
    });
  </script>
</body>
</html>
