<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Ad Spaces — BookMyBoard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230b6e5c'/><text x='50' y='70' font-size='58' text-anchor='middle' fill='white' font-family='Georgia,serif' font-weight='bold'>B</text></svg>" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <div class="page-head">
      <h1>Browse ad spaces</h1>
      <p>Filter by city, format and budget. Tap a card for full specs and booking.</p>
    </div>

    <div class="filters">
      <input type="search" id="f-q" placeholder="Search by name, area, highway…" />
      <select id="f-city"><option value="all">All cities</option></select>
      <select id="f-type"><option value="all">All formats</option></select>
      <select id="f-price">
        <option value="">Any budget</option>
        <option value="150000">Under ₹1.5L/mo</option>
        <option value="250000">Under ₹2.5L/mo</option>
        <option value="400000">Under ₹4L/mo</option>
      </select>
      <div class="reset-wrap"><button class="btn btn-outline btn-small" id="f-reset">Reset</button></div>
    </div>

    <div class="results-bar">
      <span class="count" id="count"></span>
      <select id="f-sort">
        <option value="featured">Sort: Featured</option>
        <option value="price-asc">Price: low to high</option>
        <option value="price-desc">Price: high to low</option>
        <option value="traffic-desc">Traffic: highest first</option>
      </select>
    </div>

    <div class="card-grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;"></div>
  </div>

  <footer></footer>

  <script src="/shared.js"></script>
  <script>
    const els = {
      q: document.getElementById("f-q"),
      city: document.getElementById("f-city"),
      type: document.getElementById("f-type"),
      price: document.getElementById("f-price"),
      sort: document.getElementById("f-sort"),
      grid: document.getElementById("grid"),
      empty: document.getElementById("empty"),
      count: document.getElementById("count"),
    };
    let filtersLoaded = false;

    async function load() {
      const params = new URLSearchParams();
      if (els.q.value) params.set("q", els.q.value);
      if (els.city.value !== "all") params.set("city", els.city.value);
      if (els.type.value !== "all") params.set("type", els.type.value);
      if (els.price.value) params.set("maxPrice", els.price.value);
      const { listings, cities, types } = await api("/api/listings?" + params);

      if (!filtersLoaded) {
        cities.forEach((c) => els.city.insertAdjacentHTML("beforeend", `<option>${c}</option>`));
        types.forEach((t) => els.type.insertAdjacentHTML("beforeend", `<option>${t}</option>`));
        filtersLoaded = true;
      }

      const sorted = listings.slice();
      if (els.sort.value === "price-asc") sorted.sort((a, b) => a.pricePerMonth - b.pricePerMonth);
      if (els.sort.value === "price-desc") sorted.sort((a, b) => b.pricePerMonth - a.pricePerMonth);
      if (els.sort.value === "traffic-desc") sorted.sort((a, b) => b.trafficPerDay - a.trafficPerDay);

      els.count.innerHTML = `<strong>${sorted.length}</strong> space${sorted.length === 1 ? "" : "s"} available`;
      els.grid.innerHTML = sorted.map(listingCardHTML).join("");

      const filtersActive = els.q.value || els.city.value !== "all" || els.type.value !== "all" || els.price.value;
      els.empty.style.display = sorted.length ? "none" : "block";
      els.empty.innerHTML = filtersActive
        ? "No spaces match those filters. Try widening your search."
        : 'No spaces listed yet in this area. <a href="/login.html?mode=register&role=owner">List the first one →</a>';
    }

    ["input", "change"].forEach((evt) => {
      els.q.addEventListener(evt, load);
      els.city.addEventListener(evt, load);
      els.type.addEventListener(evt, load);
      els.price.addEventListener(evt, load);
      els.sort.addEventListener(evt, load);
    });

    document.getElementById("f-reset").addEventListener("click", () => {
      els.q.value = "";
      els.city.value = "all";
      els.type.value = "all";
      els.price.value = "";
      els.sort.value = "featured";
      load();
    });

    (async () => {
      renderNav(await getMe(), "listings");
      renderFooter();
      load();
    })();
  </script>
</body>
</html>
